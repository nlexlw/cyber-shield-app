<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КиберЩит 2026</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="glow"></div>

    <div class="container">
        <div class="status-badge">Защита активна</div>
        <h1>#КиберПраво</h1>
        <p id="welcome-user" style="opacity: 0.7; font-size: 14px;">Инициализация системы...</p>

        <div class="crypto-box">
            <label style="font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">
                Шифрование сообщений
            </label>
            <textarea id="text-to-encrypt" rows="3" placeholder="Введите текст, который нужно скрыть..."></textarea>

            <button class="main-btn" onclick="encryptText()">
                🔒 Зашифровать по ГОСТ
            </button>

            <div id="result" style="display: none; margin-top: 15px; word-break: break-all; color: var(--neon-blue); background: rgba(0, 212, 255, 0.1); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px;">
            </div>
        </div>

        <p style="font-size: 10px; margin-top: 20px; opacity: 0.4;">
            Версия системы: 2.0.26-alpha
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
